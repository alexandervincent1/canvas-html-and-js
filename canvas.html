<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D</title>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>

    <canvas id="timeChart" width="1000" height="300" style="border:1px solid #000000;"></canvas>
    <canvas id="magChart" width="1000" height="300" style="border:1px solid #000000;"></canvas>
    <!-- <button onclick="generateNewSine(); y = true; x = false">Generate sine</button> -->
    <button onclick="reset()">Reset</button>
    <!-- <input id="formulaInput" placeholder="sin(5*x) + cos(2*x)">
    <button onclick="generateFromFormula(); x = true; y = false">Generate formula</button> -->
    <input id="choosePoints" placeholder="choose how many points you want to see eg 64">
    <button onclick="
        if (x === true){
            generateFromFormula();
        }
        if (y === true){
            generateNewSine();
        }
    ">Generate points</button>
    <select id="mode">
        <option value="sine">Generate sine</option>
        <option value="formula">Generate formula</option>
    </select>
    <input id="formulaInput" placeholder="sin(5*x)" style="display:none">
    <button onclick="generate()">Generate</button>
    <script src="chart.js"></script>
    <script>
        function generate() {
            const mode = document.getElementById("mode").value;

            if (mode === "sine") {
                y = true;
                x = false
                generateNewSine();
            }

            if (mode === "formula") {
                const formula = document.getElementById("formulaInput").value;
                x = true;
                y = false
                generateFromFormula();
            }
        }

        document.getElementById("mode").addEventListener("change", function () {
            document.getElementById("formulaInput").style.display =
                this.value === "formula" ? "inline-block" : "none";
        });
    </script>


    
</body>

</html>
