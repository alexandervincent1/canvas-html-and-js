<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFT Visualizer</title>
    <link rel="stylesheet" href="fft.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>

    <header>
        <div class="controls-left">
            <select id="mode">
                <option value="sine">Sine Wave</option>
                <option value="formula">Formula</option>
                <option value="wav">WAV File</option>
            </select>
            <input id="formulaInput" type="text" placeholder="sin(5*x)" style="display:none">
            <input type="file" id="wavFile" accept=".wav" style="display:none">
            <button onclick="generate()">Generate</button>
            <button class="secondary" onclick="reset()">Reset</button>
        </div>
        <div class="controls-right">
            <input id="choosePoints" type="number" placeholder="points"
                oninput="this.style.width = this.value.length * 5 + 60 + 'px'">
            <button onclick="
                if (currentMode === 1) generateNewSine();
                if (currentMode === 2) generateFromFormula();
                if (currentMode === 3) loadWavFile();
            ">Update</button>

            <button id="switchDWT" onclick="toggleTransform()">Switch to DWT</button>
        </div>
    </header>

    <main>
        <div class="graph-section">
            <div class="graph-label">Time Domain</div>
            <canvas id="timeChart" width="1000" height="280"></canvas>
            <p id="waveCount">Waves: 0</p>
        </div>
        <div class="graph-section">
            <div class="graph-label">Frequency Domain</div>
            <canvas id="magChart" width="1000" height="280"></canvas>
        </div>
    </main>

    <footer>
        <button id="flipHalfBtn" class="secondary" onclick="flipHalf()">Flip Half</button>
        <button id="togglePhaseBtn" class="secondary" onclick="togglePhase()">Toggle Phase</button>
        <div id="levelControlContainer" class="level-control" style="display: none;">
    <label for="levelInput">Level:</label>

    <input 
        id="levelInput" 
        type="number" 
        min="1" 
        max="20" 
        value="1"
        step="1"
        style="width: 60px; text-align:center;"
    >

    <input 
        id="levelSlider" 
        type="range" 
        min="1" 
        max="20" 
        value="1" 
        step="1"
        style="width: 250px;"
    >
</div>
    </footer>

    <script src="chart.js"></script>
    <script>
        function generate() {
            const mode = document.getElementById("mode").value;

            if (mode === "sine") {
                currentMode = 1;
                generateNewSine();
            }

            if (mode === "formula") {
                currentMode = 2;
                generateFromFormula();
            }

            if (mode === "wav") {
                currentMode = 3;
                loadWavFile();
            }
        }

        document.getElementById("mode").addEventListener("change", function () {
            document.getElementById("formulaInput").style.display =
                this.value === "formula" ? "inline-block" : "none";
            document.getElementById("wavFile").style.display =
                this.value === "wav" ? "inline-block" : "none";
        });
    </script>

</body>

</html>
